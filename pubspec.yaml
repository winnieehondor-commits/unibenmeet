name: school_marketplace_app
description: A school marketplace app for buying, selling, accommodation, and more
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Updated Firebase for modern Flutter Web compatibility
  firebase_core: ^3.1.1
  firebase_auth: ^5.1.1
  cloud_firestore: ^5.0.2
  firebase_storage: ^12.1.0

  # UI (These versions are fine)
  cupertino_icons: ^1.0.2
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  provider: ^6.1.1
  image_picker: ^1.0.7
  video_player: ^2.8.1
  url_launcher: ^6.2.2
  uuid: ^4.2.1
  share_plus: ^7.2.1
  intl: ^0.19.0
  smooth_page_indicator: ^1.1.0
  photo_view: ^0.14.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/